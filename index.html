<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#5b8a72" />
  <title>かみマップ｜古紙・段ボール回収ボックス</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="css/style.css?v=20260524-2" />
</head>
<body>
  <!-- ヘッダー -->
  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7h13l4 4v9H3z"/>
          <path d="M16 7V3H8v4"/>
          <path d="M8 14h8"/>
        </svg>
      </div>
      <div class="app-title">
        <h1>かみマップ</h1>
        <p class="app-subtitle">近くの古紙・段ボール回収ボックス</p>
      </div>
      <time class="app-clock" id="app-clock" aria-label="現在時刻">--:--</time>
    </div>
    <nav class="mode-switch" aria-label="表示する地域インフラ">
      <button class="mode-switch__button is-active" id="mode-paper" type="button" data-mode="paper">📦 古紙</button>
      <button class="mode-switch__button" id="mode-evacuation" type="button" data-mode="evacuation">🚨 避難所</button>
    </nav>
  </header>

  <!-- 地図 -->
  <main id="map" role="application" aria-label="回収ボックスの地図"></main>

  <section class="evacuation-filter" id="evacuation-filter" aria-label="避難所の距離フィルター">
    <div class="evacuation-filter__buttons">
      <button type="button" data-distance="1000">近く 1km</button>
      <button type="button" data-distance="3000" class="is-active">周辺 3km</button>
      <button type="button" data-distance="10000">広域 10km</button>
      <button type="button" data-distance="all">全部</button>
    </div>
    <p class="evacuation-filter__count" id="evacuation-count">表示中 0件</p>
  </section>

  <section class="evacuation-list" id="evacuation-list" aria-label="近い避難所">
    <ol id="evacuation-list-items"></ol>
  </section>

  <!-- 詳細カード（下からスライドアップ） -->
  <section class="detail-card" id="detail-card" aria-hidden="true">
    <button class="detail-card__close" id="detail-close" aria-label="閉じる">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div class="detail-card__handle" aria-hidden="true"></div>

    <div class="detail-card__body">
      <div class="detail-card__photo" id="detail-photo" hidden>
        <img id="detail-photo-img" alt="回収ボックスの現地写真" />
      </div>

      <h2 class="detail-card__name" id="detail-name">—</h2>
      <p class="detail-card__address" id="detail-address">—</p>

      <div class="detail-card__row">
        <span class="detail-card__label">回収品目</span>
        <div class="detail-card__items" id="detail-items"></div>
      </div>

      <div class="detail-card__row">
        <span class="detail-card__label">利用時間</span>
        <span class="detail-card__value" id="detail-hours">—</span>
      </div>

      <div class="detail-card__row">
        <span class="detail-card__label">満タン率</span>
        <span class="detail-card__value detail-card__status" id="detail-status">未報告</span>
      </div>

      <div class="detail-card__row">
        <span class="detail-card__label">最終報告</span>
        <span class="detail-card__value" id="detail-report-time">—</span>
      </div>

      <button class="map-link-button" id="map-link-button" type="button">Googleマップで開く</button>

      <div class="status-report" id="status-report">
        <button class="status-report__toggle" id="status-report-toggle" type="button">状態を報告する</button>
        <div class="status-report__choices" id="status-report-choices" hidden>
          <button type="button" data-status="empty">🟢 空きあり</button>
          <button type="button" data-status="half">🟡 半分くらい</button>
          <button type="button" data-status="full">🔴 満タン近い</button>
        </div>
        <p class="status-report__message" id="status-report-message" role="status" aria-live="polite"></p>
      </div>
    </div>
  </section>

  <!-- 現在地ボタン -->
  <button class="locate-button" id="locate-button" type="button" aria-label="現在地へ移動">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3"/>
      <path d="M12 19v3"/>
      <path d="M2 12h3"/>
      <path d="M19 12h3"/>
      <path d="M18.36 5.64a9 9 0 0 1 0 12.72"/>
      <path d="M5.64 5.64a9 9 0 0 0 0 12.72"/>
    </svg>
  </button>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-hidden="true"></div>

  <!-- 下部固定 投稿ボタン -->
  <div class="report-bar">
    <button class="report-button" id="open-report" type="button">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      <span>回収ボックスを見つけたら教えてください</span>
    </button>
  </div>

  <!-- 投稿フォーム（ダミー） -->
  <div class="modal" id="report-modal" aria-hidden="true">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-labelledby="report-title" aria-modal="true">
      <div class="modal__head">
        <button class="modal__back" data-close type="button">← 地図に戻る</button>
        <h2 id="report-title">回収ボックスを投稿</h2>
      </div>

      <p class="modal__lead">
        ご近所の回収ボックスを共有してください。みんなの「捨てたい」が、ちょっと楽になります。
      </p>

      <form class="report-form" id="report-form">
        <label class="report-form__field">
          <span class="report-form__label">場所の名前</span>
          <input type="text" name="name" placeholder="場所の名前を入力" required />
        </label>

        <label class="report-form__field">
          <span class="report-form__label">住所 / 目印</span>
          <input type="text" name="address" placeholder="住所または目印を入力" required />
        </label>

        <fieldset class="report-form__field">
          <legend class="report-form__label">回収できる品目</legend>
          <div class="report-form__checks">
            <label><input type="checkbox" name="items" value="段ボール" /><span>段ボール</span></label>
            <label><input type="checkbox" name="items" value="新聞" /><span>新聞</span></label>
            <label><input type="checkbox" name="items" value="雑誌" /><span>雑誌</span></label>
            <label><input type="checkbox" name="items" value="古紙" /><span>古紙</span></label>
            <label><input type="checkbox" name="items" value="牛乳パック" /><span>牛乳パック</span></label>
          </div>
        </fieldset>

        <label class="report-form__field">
          <span class="report-form__label">利用時間（わかる範囲で）</span>
          <input type="text" name="hours" placeholder="利用時間を入力" />
        </label>

        <label class="report-form__field">
          <span class="report-form__label">メモ</span>
          <textarea name="memo" rows="3" placeholder="入口の位置、注意点など"></textarea>
        </label>

        <button type="submit" class="report-form__submit">送信する</button>
        <p class="report-form__note">※ 現在はベータ版です。送信内容は確認のみで保存されません。</p>
      </form>

      <div class="modal__thanks" id="report-thanks" hidden>
        <div class="modal__thanks-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h3>ありがとうございます！</h3>
        <p>いただいた情報を確認のうえ、地図に反映します。</p>
        <button type="button" class="modal__thanks-close" data-close>閉じる</button>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="js/app.js"></script>
</body>
</html>
